{% extends "base.html" %}
{% block title %}Профиль{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="auth-card-wrapper mx-auto fade-in-up" data-delay="40">
            <div class="card shadow-soft border-0 glass-surface">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="auth-icon">
                            <i class="bi bi-person-badge"></i>
                        </div>
                        <div>
                            <p class="text-uppercase text-muted small mb-1">Личный кабинет</p>
                            <h2 class="h5 fw-semibold mb-0">Профиль пользователя</h2>
                        </div>
                    </div>
                    <form method="post" class="row g-3">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="mt-2 d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary btn-soft">
                                <i class="bi bi-check2 me-1"></i>Сохранить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
