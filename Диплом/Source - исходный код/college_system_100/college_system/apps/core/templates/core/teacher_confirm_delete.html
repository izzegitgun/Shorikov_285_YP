{% extends "base.html" %}
{% block title %}Удаление преподавателя{% endblock %}
{% block content %}
<h2 class="mb-3">Удалить преподавателя "{{ object.full_name }}"?</h2>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'core:teacher_list' %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
