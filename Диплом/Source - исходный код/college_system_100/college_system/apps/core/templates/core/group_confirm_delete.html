{% extends "base.html" %}
{% block title %}Удалить группу{% endblock %}
{% block content %}
<h2 class="mb-3 fw-semibold text-danger fade-in-up">
    <i class="bi bi-exclamation-triangle me-2"></i>Удаление группы
</h2>
<div class="card border-0 shadow-soft fade-in-up" data-delay="100">
    <div class="card-body">
        <p class="mb-4">Вы уверены, что хотите удалить группу «{{ object.name }}»?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger btn-soft">
                    <i class="bi bi-trash3 me-1"></i>Удалить
                </button>
                <a href="{% url 'core:group_list' %}" class="btn btn-outline-secondary btn-soft">
                    <i class="bi bi-x-lg me-1"></i>Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
