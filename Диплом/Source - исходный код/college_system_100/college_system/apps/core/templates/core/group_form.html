{% extends "base.html" %}
{% block title %}{% if object %}Редактирование группы{% else %}Новая группа{% endif %}{% endblock %}
{% block content %}
<h2 class="mb-3 fw-semibold fade-in-up">
    <i class="bi bi-collection me-2 text-primary"></i>
    {% if object %}Редактирование группы{% else %}Новая группа{% endif %}
</h2>
<div class="card shadow-soft border-0 fade-in-up" data-delay="100">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {{ form.as_p }}
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-soft">
                    <i class="bi bi-check2 me-1"></i>Сохранить
                </button>
                <a href="{% url 'core:group_list' %}" class="btn btn-outline-secondary btn-soft">
                    <i class="bi bi-x-lg me-1"></i>Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
