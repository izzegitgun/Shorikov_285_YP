<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — ClimaticService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="card slide-up" style="max-width: 420px;">
            <div class="auth-logo">
                <div class="icon">🌡️</div>
                <h2>Регистрация</h2>
                <p>Создайте аккаунт, чтобы оставлять заявки на ремонт</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label required">ФИО</label>
                    <input type="text" class="form-control" id="fio" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="form-group">
                    <label class="form-label required">Телефон</label>
                    <input type="tel" class="form-control" id="phone" placeholder="+7 (999) 123-45-67" required>
                </div>
                <div class="form-group">
                    <label class="form-label required">Логин</label>
                    <input type="text" class="form-control" id="login" placeholder="Придумайте логин" required>
                </div>
                <div class="form-group">
                    <label class="form-label required">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Не менее 4 символов" required minlength="4">
                </div>
                <button type="submit" class="btn btn-primary w-full" id="submitBtn">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                <a href="/login.html">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return') || '/pages/menu.html';

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const result = await Auth.register({
                fio: document.getElementById('fio').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                login: document.getElementById('login').value.trim(),
                password: document.getElementById('password').value,
                type: 'Заказчик'
            });

            if (result.success) {
                StorageManager.setUser(result.data.user);
                NotificationManager.success('Регистрация успешна');
                setTimeout(() => { window.location.href = returnUrl; }, 800);
            } else {
                NotificationManager.error(result.error);
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
