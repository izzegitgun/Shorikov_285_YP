<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaticService — редактирование</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <button type="button" class="btn btn-secondary btn-sm" onclick="window.history.back()">← Назад</button>
    </nav>

    <main class="container" style="max-width: 560px;">
        <div class="card slide-up">
            <h1 class="mb-4">Редактирование заявки</h1>

            <form id="editForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label">Статус</label>
                    <select class="form-control" id="statusId"></select>
                </div>

                <div class="form-group">
                    <label class="form-label">Описание проблемы</label>
                    <textarea class="form-control" id="problemDescription" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Мастер</label>
                    <select class="form-control" id="masterId">
                        <option value="">не назначен</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Комплектующие</label>
                    <textarea class="form-control" id="repairParts" rows="2" placeholder="Использованные запчасти…"></textarea>
                </div>

                <div class="flex gap-2" style="margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/requests.js"></script>
    <script>const requestId = new URLSearchParams(window.location.search).get('id');
        let request = null;

        if (!requestId) {
            NotificationManager.error('ID заявки не указан');
            setTimeout(() => window.location.href = '/pages/requests.html', 1000);
        }

        // Загружаем статусы
        Promise.all([
            RequestsAPI.getStatuses(),
            RequestsAPI.getById(requestId),
            Auth.isManager() ? fetch(`${API_BASE}/Auth/masters`).then(r => r.json()) : []
        ]).then(([statuses, req, masters]) => {
            request = req;

            // Статусы
            const statusSelect = document.getElementById('statusId');
            statuses.forEach(s => {
                statusSelect.innerHTML += `<option value="${s.statusId}" ${s.statusId === req.statusId ? 'selected' : ''}>${s.statusName}</option>`;
            });

            // Мастера (только для менеджеров)
            if (Auth.isManager()) {
                const masterSelect = document.getElementById('masterId');
                masterSelect.innerHTML = '<option value="">не назначен</option>';
                masters.forEach(m => {
                    masterSelect.innerHTML += `<option value="${m.userId}" ${m.userId === req.masterId ? 'selected' : ''}>${m.fio}</option>`;
                });
            } else {
                document.getElementById('masterId').parentElement.style.display = 'none';
            }

            // Заполняем остальные поля
            document.getElementById('problemDescription').value = req.problemDescription || '';
            document.getElementById('repairParts').value = req.repairParts || '';
        });

        async function handleSubmit(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const updateData = {
                statusId: parseInt(document.getElementById('statusId').value),
                problemDescription: document.getElementById('problemDescription').value,
                repairParts: document.getElementById('repairParts').value || null
            };

            if (Auth.isManager()) {
                const masterId = document.getElementById('masterId').value;
                if (masterId) {
                    updateData.masterId = parseInt(masterId);
                }
            }

            try {
                await RequestsAPI.update(requestId, updateData);
                NotificationManager.success('Изменения сохранены');
                setTimeout(() => window.location.href = `/pages/request-detail.html?id=${requestId}`, 1000);
            } catch (error) {
                NotificationManager.error(error.message);
                btn.disabled = false;
            }
        }</script>
</body>
</html>
