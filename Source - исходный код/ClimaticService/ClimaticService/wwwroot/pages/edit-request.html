<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaticService — редактирование</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <button type="button" class="btn btn-secondary btn-sm" onclick="window.history.back()">← Назад</button>
    </nav>

    <main class="container" style="max-width: 600px;">
        <div class="card slide-up">
            <h1 class="mb-4">Редактирование заявки #<span id="requestIdSpan"></span></h1>

            <form id="editForm">
                <!-- Статус (доступен всем) -->
                <div class="form-group">
                    <label class="form-label">Статус</label>
                    <select class="form-control" id="statusId"></select>
                </div>

                <!-- Дата создания (только для менеджеров) -->
                <div class="form-group" id="startDateGroup" style="display: none;">
                    <label class="form-label">Дата создания заявки</label>
                    <input type="datetime-local" class="form-control" id="startDate">
                </div>

                <!-- Описание проблемы (доступно всем) -->
                <div class="form-group">
                    <label class="form-label">Описание проблемы</label>
                    <textarea class="form-control" id="problemDescription" rows="4"></textarea>
                </div>

                <!-- Мастер (только для менеджеров) -->
                <div class="form-group" id="masterGroup" style="display: none;">
                    <label class="form-label">Мастер</label>
                    <select class="form-control" id="masterId">
                        <option value="">не назначен</option>
                    </select>
                </div>

                <!-- Комплектующие (доступно всем) -->
                <div class="form-group">
                    <label class="form-label">Комплектующие</label>
                    <textarea class="form-control" id="repairParts" rows="2" placeholder="Использованные запчасти…"></textarea>
                </div>

                <!-- Дата завершения (для статуса "Завершена") -->
                <div class="form-group" id="completionDateGroup" style="display: none;">
                    <label class="form-label">Дата завершения</label>
                    <input type="datetime-local" class="form-control" id="completionDate">
                </div>

                <div class="flex gap-2" style="margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/requests.js"></script>
    <script>
        const requestId = new URLSearchParams(window.location.search).get('id');
        const user = Auth.getCurrentUser();
        const isManager = Auth.isManager();

        if (!requestId) {
            NotificationManager.error('ID заявки не указан');
            setTimeout(() => window.location.href = '/pages/requests.html', 1000);
        }

        document.getElementById('requestIdSpan').textContent = requestId;

        // Показываем дополнительные поля для менеджеров
        if (isManager) {
            document.getElementById('startDateGroup').style.display = 'block';
            document.getElementById('masterGroup').style.display = 'block';
        }

        // Загружаем данные
        Promise.all([
            RequestsAPI.getStatuses(),
            RequestsAPI.getById(requestId),
            isManager ? fetch(`${API_BASE}/Auth/masters`).then(r => r.json()) : []
        ]).then(([statuses, req, masters]) => {

            // Статусы
            const statusSelect = document.getElementById('statusId');
            statuses.forEach(s => {
                statusSelect.innerHTML += `<option value="${s.statusId}" ${s.statusId === req.statusId ? 'selected' : ''}>${s.statusName}</option>`;
            });

            // Дата создания (для менеджеров)
            if (isManager && req.startDate) {
                const startDate = new Date(req.startDate);
                const localStartDate = new Date(startDate.getTime() - (startDate.getTimezoneOffset() * 60000))
                    .toISOString()
                    .slice(0, 16);
                document.getElementById('startDate').value = localStartDate;
            }

            // Мастера (только для менеджеров)
            if (isManager) {
                const masterSelect = document.getElementById('masterId');
                masterSelect.innerHTML = '<option value="">не назначен</option>';
                masters.forEach(m => {
                    masterSelect.innerHTML += `<option value="${m.userId}" ${m.userId === req.masterId ? 'selected' : ''}>${m.fio}</option>`;
                });
            }

            // Заполняем остальные поля
            document.getElementById('problemDescription').value = req.problemDescription || '';
            document.getElementById('repairParts').value = req.repairParts || '';

            // Дата завершения
            if (req.completionDate) {
                const date = new Date(req.completionDate);
                const localDate = new Date(date.getTime() - (date.getTimezoneOffset() * 60000))
                    .toISOString()
                    .slice(0, 16);
                document.getElementById('completionDate').value = localDate;
            }

            // Показываем поле даты завершения если статус "Завершена"
            if (req.statusId === 4) {
                document.getElementById('completionDateGroup').style.display = 'block';
            }

            // Обработчик изменения статуса
            statusSelect.addEventListener('change', function () {
                const completionGroup = document.getElementById('completionDateGroup');
                if (this.value === '4') {
                    completionGroup.style.display = 'block';
                    if (!document.getElementById('completionDate').value) {
                        const now = new Date();
                        const localNow = new Date(now.getTime() - (now.getTimezoneOffset() * 60000))
                            .toISOString()
                            .slice(0, 16);
                        document.getElementById('completionDate').value = localNow;
                    }
                } else {
                    completionGroup.style.display = 'none';
                }
            });
        });

        // Обработка отправки формы
        document.getElementById('editForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const updateData = {
                statusId: parseInt(document.getElementById('statusId').value),
                problemDescription: document.getElementById('problemDescription').value,
                repairParts: document.getElementById('repairParts').value || null
            };

            // Добавляем дату создания для менеджеров
            if (isManager) {
                const startDate = document.getElementById('startDate').value;
                if (startDate) {
                    updateData.startDate = new Date(startDate).toISOString();
                }

                const masterId = document.getElementById('masterId').value;
                if (masterId) {
                    updateData.masterId = parseInt(masterId);
                }
            }

            // Добавляем дату завершения если статус "Завершена"
            if (updateData.statusId === 4) {
                const completionDate = document.getElementById('completionDate').value;
                if (completionDate) {
                    updateData.completionDate = new Date(completionDate).toISOString();
                }
            }

            try {
                await RequestsAPI.update(requestId, updateData);
                NotificationManager.success('Изменения сохранены');
                setTimeout(() => window.location.href = `/pages/request-detail.html?id=${requestId}`, 1000);
            } catch (error) {
                NotificationManager.error(error.message);
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
