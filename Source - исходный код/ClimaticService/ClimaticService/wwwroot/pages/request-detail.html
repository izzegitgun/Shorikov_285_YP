<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка — ClimaticService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <button type="button" class="btn btn-secondary btn-sm" id="backToListBtn">← К списку</button>
    </nav>

    <main class="container" style="max-width: 720px;">
        <div id="loading" class="loading" style="display: none;">Загрузка…</div>

        <div id="content" style="display: none;">
            <div class="card mb-4 slide-up">
                <div class="flex justify-between items-center">
                    <h1 id="requestTitle">Заявка #</h1>
                    <span class="status-badge" id="statusBadge"></span>
                </div>
            </div>

            <div class="card mb-4">
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-label">Дата создания</div>
                        <div class="detail-value" id="startDate"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Тип оборудования</div>
                        <div class="detail-value" id="equipmentType"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Модель</div>
                        <div class="detail-value" id="model"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Клиент</div>
                        <div class="detail-value" id="clientInfo"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Мастер</div>
                        <div class="detail-value" id="masterInfo"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Дней в работе</div>
                        <div class="detail-value" id="daysInWork"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="detail-label mb-2">Описание проблемы</div>
                    <p class="detail-value" id="problemDescription" style="font-size:1rem; font-weight:400;"></p>
                </div>

                <div id="repairPartsSection" style="display: none;" class="mt-4">
                    <div class="detail-label mb-2">Комплектующие</div>
                    <p class="detail-value" id="repairParts" style="background: var(--bg); padding: 1rem; border-radius: var(--radius-sm); font-weight: 400;"></p>
                </div>
            </div>

            <div class="card">
                <h3 class="section-title">Комментарии</h3>
                <div id="commentsList" class="comments-section"></div>

                <div id="addCommentSection" style="display: none;" class="mt-4">
                    <textarea class="form-control" id="commentText" placeholder="Добавить комментарий…" rows="3"></textarea>
                    <button type="button" class="btn btn-primary btn-sm mt-2" onclick="addComment()">Отправить</button>
                </div>
            </div>

            <div class="flex gap-2 mt-4" id="actionButtons"></div>

            <!-- Модальное окно с QR-кодом для оценки -->
            <div id="feedbackModal" class="modal" style="display:none;">
                <div class="modal-backdrop" onclick="window.page.closeFeedbackModal()"></div>
                <div class="modal-content">
                    <h3 class="section-title">Оценка работы сервисной службы</h3>
                    <p style="color: var(--text-muted); margin-bottom: 1rem;">
                        Отсканируйте QR-код камерой телефона — откроется форма с опросом о качестве выполненных работ.
                    </p>
                    <div style="display:flex; justify-content:center; padding:1rem 0;">
                        <img id="feedbackQrImage" alt="QR-код для оценки качества" style="width:220px;height:220px;border-radius:var(--radius-md);box-shadow:0 4px 16px rgba(0,0,0,0.12);" />
                    </div>
                    <div class="flex justify-end mt-3">
                        <button type="button" class="btn btn-secondary" onclick="window.page.closeFeedbackModal()">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/requests.js"></script>
    <script>
        class RequestDetailPage {
            constructor() {
                this.requestId = new URLSearchParams(window.location.search).get('id');
                this.request = null;
                this.user = Auth.getCurrentUser();
                if (!this.requestId) {
                    NotificationManager.error('ID заявки не указан');
                    setTimeout(() => window.location.href = '/pages/requests.html', 1000);
                    return;
                }
                this.init();
            }

            async init() {
                await this.loadRequest();
                await this.loadComments();
            }

            async loadRequest() {
                try {
                    this.request = await RequestsAPI.getById(this.requestId);
                    this.renderRequest();
                } catch (e) { NotificationManager.error('Ошибка загрузки заявки'); }
            }

            async loadComments() {
                try {
                    const comments = await RequestsAPI.getComments(this.requestId);
                    this.renderComments(comments);
                } catch (e) { console.error(e); }
            }

            renderRequest() {
                const req = this.request;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                const backBtn = document.getElementById('backToListBtn');
                if (backBtn) backBtn.onclick = () => window.location.href = this.user.type === 'Специалист' ? '/pages/my-tasks.html' : '/pages/requests.html';

                document.getElementById('requestTitle').textContent = 'Заявка #' + req.requestId;
                document.getElementById('startDate').textContent = Formatter.datetime(req.startDate);
                document.getElementById('equipmentType').textContent = req.equipmentType?.typeName || '—';
                document.getElementById('model').textContent = req.model;
                document.getElementById('problemDescription').textContent = req.problemDescription;

                const days = Math.ceil((new Date() - new Date(req.startDate)) / (1000*60*60*24));
                document.getElementById('daysInWork').textContent = Formatter.days(days);

                document.getElementById('clientInfo').innerHTML = (req.client?.fio || '—') + '<br><small style="color:var(--text-muted)">' + (Formatter.phone(req.client?.phone) || '') + '</small>';
                document.getElementById('masterInfo').textContent = req.master?.fio || '—';

                const statusBadge = document.getElementById('statusBadge');
                statusBadge.textContent = req.status?.statusName || '—';
                statusBadge.className = 'status-badge ' + RequestRenderer.getStatusClass(req.status?.statusName);

                if (req.repairParts) {
                    document.getElementById('repairPartsSection').style.display = 'block';
                    document.getElementById('repairParts').textContent = req.repairParts;
                }

                this.renderActionButtons();
            }

            renderComments(comments) {
                const container = document.getElementById('commentsList');
                if (!comments.length) {
                    container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:1rem;">Комментариев пока нет</p>';
                    return;
                }
                container.innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-author">${c.author?.fio || 'Специалист'}</span>
                            <span class="comment-date">—</span>
                        </div>
                        <div class="comment-text">${c.message}</div>
                    </div>
                `).join('');
            }

            renderActionButtons() {
                const container = document.getElementById('actionButtons');
                let html = '';

                // Специалист: управление статусами своей заявки
                if (this.user.type === 'Специалист' && this.request.masterId === this.user.userId) {
                    if (this.request.statusId !== 4 && this.request.statusId !== 5) {
                        document.getElementById('addCommentSection').style.display = 'block';
                        html += `
                            <button type="button" class="btn btn-secondary" onclick="window.page.changeStatus(2)">В работу</button>
                            <button type="button" class="btn btn-secondary" onclick="window.page.changeStatus(3)">Ожидание запчастей</button>
                            <button type="button" class="btn btn-secondary" onclick="window.page.complete()">Завершить</button>
                            <button type="button" class="btn btn-secondary" onclick="window.page.requestQualityHelp()">Обратиться к менеджеру по качеству</button>
                        `;
                    }
                }

                // Назначение мастера менеджером
                if (Auth.isManager() && !this.request.masterId) {
                    html += `<button type="button" class="btn btn-secondary" onclick="window.page.assignMaster()">Назначить мастера</button>`;
                }

                // Редактирование только для менеджера и назначенного специалиста (клиент не может редактировать)
                if (Auth.isManager() ||
                    (this.user.type === 'Специалист' && this.request.masterId === this.user.userId)) {
                    html += `<button type="button" class="btn btn-secondary" onclick="window.page.edit()">Редактировать</button>`;
                }

                // Кнопка "Оценить работу" для заказчика по завершённой заявке
                if (this.user.type === 'Заказчик' &&
                    this.user.userId === this.request.clientId &&
                    this.request.statusId === 4) {
                    html += `<button type="button" class="btn btn-secondary" onclick="window.page.openFeedbackModal()">Оценить работу</button>`;
                }

                // Дополнительные действия менеджера
                if (Auth.isManager()) {
                    html += `<button type="button" class="btn btn-secondary" onclick="window.page.extendDeadline()">Продлить срок</button>`;
                    html += `<button type="button" class="btn btn-danger" onclick="window.page.deleteRequest()">Удалить заявку</button>`;
                }

                container.innerHTML = html;
            }

            async changeStatus(statusId) {
                try {
                    await RequestsAPI.changeStatus(this.requestId, statusId);
                    NotificationManager.success('Статус обновлён');
                    await this.loadRequest();
                } catch (e) { NotificationManager.error(e.message); }
            }

            async complete() {
                const parts = prompt('Использованные комплектующие (необязательно):');
                await RequestsAPI.update(this.requestId, { statusId: 4, completionDate: new Date().toISOString(), repairParts: parts || null });
                await this.loadRequest();
            }

            async requestQualityHelp() {
                const description = prompt('Опишите проблему, из-за которой невозможно выполнить ремонт в срок:');
                if (!description) return;
                try {
                    await RequestsAPI.requestQualityHelp(this.requestId, {
                        technicianId: this.user.userId,
                        problemDescription: description
                    });
                    NotificationManager.success('Запрос помощи менеджера по качеству отправлен');
                } catch (e) {
                    NotificationManager.error(e.message);
                }
            }

            async extendDeadline() {
                const dateInput = prompt('Новая плановая дата завершения (в формате ГГГГ-ММ-ДД):');
                if (!dateInput) return;
                const parsedDate = new Date(dateInput);
                if (isNaN(parsedDate.getTime())) {
                    NotificationManager.error('Некорректная дата');
                    return;
                }
                const note = prompt('Краткое описание согласования с заказчиком:');
                try {
                    await RequestsAPI.extendDeadline(this.requestId, {
                        qualityManagerId: this.user.userId,
                        newPlannedCompletionDate: parsedDate.toISOString(),
                        customerApprovalNote: note || ''
                    });
                    NotificationManager.success('Срок выполнения заявки продлён');
                    await this.loadRequest();
                } catch (e) {
                    NotificationManager.error(e.message);
                }
            }

            openFeedbackModal() {
                const modal = document.getElementById('feedbackModal');
                const img = document.getElementById('feedbackQrImage');
                img.src = `${API_BASE}/Requests/${this.requestId}/feedback-qr`;
                modal.style.display = 'block';
            }

            closeFeedbackModal() {
                const modal = document.getElementById('feedbackModal');
                modal.style.display = 'none';
            }

            async addComment() {
                const text = document.getElementById('commentText').value.trim();
                if (!text) return;
                try {
                    await RequestsAPI.addComment(this.requestId, text, this.user.userId);
                    document.getElementById('commentText').value = '';
                    await this.loadComments();
                    NotificationManager.success('Комментарий добавлен');
                } catch (e) { NotificationManager.error(e.message); }
            }

            edit() { window.location.href = '/pages/edit-request.html?id=' + this.requestId; }
            assignMaster() { window.location.href = '/pages/assign-master.html?id=' + this.requestId; }

            async deleteRequest() {
                if (!confirm('Удалить заявку #' + this.requestId + '? Это действие нельзя отменить.')) return;
                try {
                    await RequestsAPI.delete(this.requestId);
                    NotificationManager.success('Заявка удалена');
                    window.location.href = '/pages/requests.html';
                } catch (e) { NotificationManager.error(e.message); }
            }
        }

        document.addEventListener('DOMContentLoaded', () => { window.page = new RequestDetailPage(); });
        window.addComment = () => window.page.addComment();
    </script>
</body>
</html>
