<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaticService — статистика</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <button type="button" class="btn btn-secondary btn-sm" onclick="window.location.href='/pages/menu.html'">← Назад</button>
    </nav>

    <main class="container">
        <div class="flex justify-between items-center mb-4">
            <h1>Статистика</h1>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/pages/requests.html'">
                Все заявки
            </button>
        </div>

        <div class="stats-grid mb-4" id="mainStats"></div>

        <div class="card mb-4">
            <h3 class="section-title">По статусам</h3>
            <div id="statusStats" class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));"></div>
        </div>

        <!-- Типы неисправностей -->
        <div class="card">
            <h3 class="section-title">По типам оборудования</h3>
            <div id="typeStats" class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));"></div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/requests.js"></script>
    <script>async function loadStatistics() {
            try {
                const stats = await RequestsAPI.getStatistics();

                // Основные показатели
                document.getElementById('mainStats').innerHTML = [
                    { icon: '📋', value: stats.totalRequests, label: 'всего заявок' },
                    { icon: '✅', value: stats.completedRequests, label: 'завершено' },
                    { icon: '⚙️', value: stats.inProgressRequests, label: 'в работе' },
                    { icon: '🆕', value: stats.newRequests, label: 'новых' },
                    { icon: '⏱️', value: stats.averageCompletionTimeDays, label: 'среднее время (дней)' }
                ].map(item => `
                    <div class="stat-card">
                        <div class="stat-icon">${item.icon}</div>
                        <div class="stat-value">${item.value}</div>
                        <div class="stat-label">${item.label}</div>
                    </div>
                `).join('');

                // Статусы
                document.getElementById('statusStats').innerHTML = stats.statusStatistics.map(s => `
                    <div class="stat-card">
                        <div class="stat-value">${s.count}</div>
                        <div class="stat-label">${s.statusName}</div>
                    </div>
                `).join('');

                // Типы
                document.getElementById('typeStats').innerHTML = stats.faultTypeStatistics.map(t => `
                    <div class="stat-card">
                        <div class="stat-value">${t.count}</div>
                        <div class="stat-label">${t.typeName}</div>
                    </div>
                `).join('');

            } catch (error) {
                NotificationManager.error('Ошибка загрузки статистики');
            }
        }

        loadStatistics();</script>
</body>
</html>
