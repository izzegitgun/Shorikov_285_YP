<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи — ClimaticService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <button type="button" class="btn btn-secondary btn-sm" onclick="window.location.href='/pages/menu.html'">← Назад</button>
    </nav>

    <main class="container">
        <h1 class="mb-4">Пользователи</h1>
        <p style="color: var(--text-muted); margin-bottom: 1.25rem;">Список зарегистрированных пользователей.</p>

        <div class="filters">
            <div class="filter-group">
                <label>Поиск по имени или логину</label>
                <input type="text" class="form-control" id="searchInput" placeholder="Введите имя или логин…">
            </div>
            <div class="filter-group">
                <label>Роль</label>
                <select class="form-control" id="roleFilter">
                    <option value="">Все роли</option>
                    <option value="Менеджер">Менеджер</option>
                    <option value="Менеджер по качеству">Менеджер по качеству</option>
                    <option value="Специалист">Специалист</option>
                    <option value="Заказчик">Заказчик</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Логин</th>
                        <th>Телефон</th>
                        <th>Роль</th>
                        <th>Дата регистрации</th>
                        <th id="thActions">Действия</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="6" class="loading">Загрузка…</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="editModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <div class="modal">
            <div class="modal-header">
                <h2 id="editModalTitle" class="modal-title">Редактировать пользователя</h2>
                <button type="button" class="modal-close" id="editModalClose" aria-label="Закрыть">×</button>
            </div>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label class="form-label required">Имя (ФИО)</label>
                    <input type="text" class="form-control" id="editFio" required>
                </div>
                <div class="form-group">
                    <label class="form-label required">Логин</label>
                    <input type="text" class="form-control" id="editLogin" required>
                </div>
                <div class="form-group">
                    <label class="form-label required">Телефон</label>
                    <input type="tel" class="form-control" id="editPhone" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Новый пароль</label>
                    <input type="password" class="form-control" id="editPassword" placeholder="Оставьте пустым, чтобы не менять">
                </div>
                <div class="form-group">
                    <label class="form-label required">Роль</label>
                    <select class="form-control" id="editType" required>
                        <option value="Заказчик">Заказчик</option>
                        <option value="Специалист">Специалист</option>
                        <option value="Менеджер">Менеджер</option>
                        <option value="Менеджер по качеству">Менеджер по качеству</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="editModalCancel">Отмена</button>
                    <button type="submit" class="btn btn-primary" id="editSubmitBtn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="modal">
            <div class="modal-header">
                <h2 id="deleteModalTitle" class="modal-title">Удаление пользователя</h2>
                <button type="button" class="modal-close" id="deleteModalClose" aria-label="Закрыть">×</button>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Вы уверены, что хотите удалить пользователя <strong id="deleteUserName"></strong>?</p>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="deleteModalCancel">Отмена</button>
                <button type="button" class="btn btn-danger" id="deleteConfirmBtn">Да, удалить</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/users.js"></script>
    <script>
        (function () {
            const currentUser = Auth.getCurrentUser();
            const allowedRoles = ['Менеджер', 'Менеджер по качеству', 'Специалист'];
            if (!currentUser || !allowedRoles.includes(currentUser.type)) {
                window.location.href = '/pages/menu.html';
                return;
            }

            const isManager = Auth.isManager(); // Менеджер или Менеджер по качеству
            const isSpecialist = currentUser.type === 'Специалист';

            let allUsers = [];
            let deleteTargetId = null;

            async function loadUsers() {
                try {
                    allUsers = await UsersAPI.getAll();
                    applyFilters();
                } catch (e) {
                    document.getElementById('usersBody').innerHTML =
                        '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2.5rem;">Ошибка загрузки</td></tr>';
                    NotificationManager.error(e.message);
                }
            }

            function applyFilters() {
                const search = document.getElementById('searchInput').value.trim().toLowerCase();
                const role = document.getElementById('roleFilter').value;
                let list = allUsers.filter(u => {
                    if (search && !u.fio.toLowerCase().includes(search) && !(u.login || '').toLowerCase().includes(search)) return false;
                    if (role && u.type !== role) return false;
                    return true;
                });
                renderTable(list);
            }

            function renderTable(users) {
                const tbody = document.getElementById('usersBody');

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2.5rem;">Пользователи не найдены</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => {
                    const registrationDate = u.registrationDate ? Formatter.date(u.registrationDate) : '—';

                    if (isSpecialist) {
                        return `
                                <tr>
                                    <td>${escapeHtml(u.fio)}</td>
                                    <td>${escapeHtml(u.login || '—')}</td>
                                    <td>${escapeHtml(u.phone || '—')}</td>
                                    <td>${escapeHtml(u.type)}</td>
                                    <td>${registrationDate}</td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-secondary" onclick="viewUser(${u.userId})">Просмотр</button>
                                    </td>
                                </tr>
                            `;
                    }

                    return `
                            <tr>
                                <td>${escapeHtml(u.fio)}</td>
                                <td>${escapeHtml(u.login || '—')}</td>
                                <td>${escapeHtml(u.phone || '—')}</td>
                                <td>${escapeHtml(u.type)}</td>
                                <td>${registrationDate}</td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-secondary" onclick="openEditModal(${u.userId})">✎</button>
                                    <button type="button" class="btn btn-sm btn-danger" onclick="openDeleteModal(${u.userId})">🗑</button>
                                </td>
                            </tr>
                        `;
                }).join('');
            }

            function escapeHtml(s) {
                if (!s) return '';
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            window.viewUser = function (userId) {
                const user = allUsers.find(u => u.userId === userId);
                if (!user) return;

                const info = `
                        ФИО: ${user.fio}
                        Логин: ${user.login || '—'}
                        Телефон: ${user.phone || '—'}
                        Роль: ${user.type}
                    `;
                NotificationManager.info(info);
            };

            // Редактирование (только для менеджеров)
            window.openEditModal = function (userId) {
                if (!isManager) return;
                const user = allUsers.find(u => u.userId === userId);
                if (!user) return;

                document.getElementById('editUserId').value = user.userId;
                document.getElementById('editFio').value = user.fio;
                document.getElementById('editLogin').value = user.login || '';
                document.getElementById('editPhone').value = user.phone || '';
                document.getElementById('editPassword').value = '';
                document.getElementById('editType').value = user.type || 'Заказчик';
                document.getElementById('editModal').style.display = 'flex';
            };

            function closeEditModal() {
                document.getElementById('editModal').style.display = 'none';
            }

            document.getElementById('editModalClose').onclick = closeEditModal;
            document.getElementById('editModalCancel').onclick = closeEditModal;
            document.getElementById('editModal').onclick = function (e) {
                if (e.target === this) closeEditModal();
            };

            document.getElementById('editUserForm').onsubmit = async function (e) {
                e.preventDefault();
                if (!isManager) return;

                const id = Number(document.getElementById('editUserId').value);
                const btn = document.getElementById('editSubmitBtn');
                btn.disabled = true;

                try {
                    await UsersAPI.update(id, {
                        fio: document.getElementById('editFio').value.trim(),
                        login: document.getElementById('editLogin').value.trim(),
                        phone: document.getElementById('editPhone').value.trim(),
                        password: document.getElementById('editPassword').value || undefined,
                        type: document.getElementById('editType').value
                    });
                    NotificationManager.success('Изменения сохранены');
                    closeEditModal();
                    loadUsers();
                } catch (err) {
                    NotificationManager.error(err.message);
                }
                btn.disabled = false;
            };

            // Удаление (только для менеджеров)
            window.openDeleteModal = function (userId) {
                if (!isManager) return;

                deleteTargetId = userId;
                const user = allUsers.find(u => u.userId === userId);
                document.getElementById('deleteUserName').textContent = user ? user.fio : '№' + userId;
                document.getElementById('deleteModal').style.display = 'flex';
            };

            function closeDeleteModal() {
                document.getElementById('deleteModal').style.display = 'none';
                deleteTargetId = null;
            }

            document.getElementById('deleteModalClose').onclick = closeDeleteModal;
            document.getElementById('deleteModalCancel').onclick = closeDeleteModal;
            document.getElementById('deleteModal').onclick = function (e) {
                if (e.target === this) closeDeleteModal();
            };

            document.getElementById('deleteConfirmBtn').onclick = async function () {
                if (!isManager || deleteTargetId == null) return;

                this.disabled = true;
                try {
                    await UsersAPI.delete(deleteTargetId);
                    NotificationManager.success('Пользователь удалён');
                    closeDeleteModal();
                    loadUsers();
                } catch (err) {
                    NotificationManager.error(err.message);
                }
                this.disabled = false;
            };

            document.getElementById('searchInput').addEventListener('input', () => applyFilters());
            document.getElementById('roleFilter').addEventListener('change', () => applyFilters());

            document.addEventListener('DOMContentLoaded', () => loadUsers());
        })();
    </script>
</body>
</html>
