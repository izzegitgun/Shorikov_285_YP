<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная — ClimaticService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <div class="user-menu">
            <div class="user-info">
                <span class="user-name" id="userName">…</span>
                <span class="user-badge" id="userType"></span>
            </div>
            <button class="btn btn-secondary btn-sm" id="logoutBtn">Выйти</button>
        </div>
    </nav>

    <main class="container">
        <div class="stats-grid" id="statsContainer">
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-value">—</div>
                <div class="stat-label">загрузка…</div>
            </div>
        </div>

        <div class="card mb-4 slide-up">
            <h2 id="welcomeMessage" class="mb-1">Добро пожаловать</h2>
            <p style="color: var(--text-muted); margin: 0;">Выберите нужный раздел для работы</p>
        </div>

        <div class="menu-grid" id="menuContainer"></div>

        <div class="stats-grid mt-4" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
            <div class="stat-card" id="quickNewRequestCard" onclick="window.location.href='/pages/create-request.html'">
                <div class="stat-icon">✎</div>
                <div class="stat-label">Новая заявка</div>
            </div>
            <div class="stat-card" id="quickAllRequestsCard" onclick="window.location.href='/pages/requests.html'">
                <div class="stat-icon">📋</div>
                <div class="stat-label">Все заявки</div>
            </div>
            <div class="stat-card" id="quickLogoutCard" onclick="Auth.logout()">
                <div class="stat-icon">←</div>
                <div class="stat-label">Выход</div>
            </div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/requests.js"></script>
    <script>
        class MenuPage {
            static async init() {
                this.user = Auth.getCurrentUser();
                if (!this.user) return;

                this.renderUserInfo();
                // Панель статистики показываем только не для заказчика
                if (this.user.type !== 'Заказчик') {
                    await this.loadStatistics();
                    document.getElementById('statsContainer').style.display = '';
                } else {
                    const stats = document.getElementById('statsContainer');
                    if (stats) stats.style.display = 'none';
                }
                this.renderMenu();
            }

            static renderUserInfo() {
                document.getElementById('userName').textContent = this.user.fio.split(' ')[0];
                document.getElementById('userType').textContent = this.user.type;
                document.getElementById('welcomeMessage').textContent = 'Добро пожаловать, ' + this.user.fio.split(' ')[0];
            }

            static async loadStatistics() {
                try {
                    const stats = await RequestsAPI.getStatistics();
                    document.getElementById('statsContainer').innerHTML = [
                        { icon: '📋', value: stats.totalRequests || 0, label: 'всего заявок' },
                        { icon: '🆕', value: stats.newRequests || 0, label: 'новых' },
                        { icon: '⚙️', value: stats.inProgressRequests || 0, label: 'в работе' },
                        { icon: '✅', value: stats.completedRequests || 0, label: 'завершено' }
                    ].map(item => `
                        <div class="stat-card">
                            <div class="stat-icon">${item.icon}</div>
                            <div class="stat-value">${item.value}</div>
                            <div class="stat-label">${item.label}</div>
                        </div>
                    `).join('');
                } catch (e) { console.error(e); }
            }

            static renderMenu() {
                const role = this.user.type;
                let menuItems = [];

                // Менеджер / менеджер по качеству — админские возможности
                if (role === 'Менеджер' || role === 'Менеджер по качеству') {
                    menuItems = [
                        { icon: '📋', title: 'Все заявки', description: 'Просмотр и управление всеми заявками', link: '/pages/requests.html' },
                        { icon: '✎', title: 'Создать заявку', description: 'Создать заявку от лица клиента', link: '/pages/create-request.html' },
                        { icon: '🔍', title: 'Поиск заявок', description: 'Поиск по параметрам и фильтрам', link: '/pages/requests.html' },
                        { icon: '📊', title: 'Статистика', description: 'Аналитика работы сервисной службы', link: '/pages/statistics.html' },
                        { icon: '👥', title: 'Пользователи', description: 'Управление пользователями системы', link: '/pages/users.html' }
                    ];
                }
                // Специалист — свои задания + возможность создать заявку от своего имени
                else if (role === 'Специалист') {
                    menuItems = [
                        { icon: '🔧', title: 'Мои задания', description: 'Заявки, назначенные вам на ремонт', link: '/pages/my-tasks.html' },
                        { icon: '✎', title: 'Новая заявка', description: 'Создать заявку от своего имени', link: '/pages/create-request.html' }
                    ];
                }
                // Заказчик — только свои заявки и подача новой
                else if (role === 'Заказчик') {
                    menuItems = [
                        { icon: '📝', title: 'Мои заявки', description: 'История и статус ваших заявок', link: '/pages/my-requests.html' },
                        { icon: '✎', title: 'Новая заявка', description: 'Оставить заявку на ремонт', link: '/pages/create-request.html' }
                    ];
                }
                // Оператор или другие — упрощённое меню
                else if (role === 'Оператор') {
                    menuItems = [
                        { icon: '✎', title: 'Создать заявку', description: 'Оформление заявок от клиентов', link: '/pages/create-request.html' },
                        { icon: '📋', title: 'Все заявки', description: 'Просмотр всех заявок', link: '/pages/requests.html' }
                    ];
                }

                document.getElementById('menuContainer').innerHTML = menuItems.map(item => `
                    <div class="menu-card" onclick="window.location.href='${item.link}'">
                        <div class="menu-icon">${item.icon}</div>
                        <h3 class="menu-title">${item.title}</h3>
                        <p class="menu-description">${item.description}</p>
                    </div>
                `).join('');

                // Быстрые карточки внизу: скрываем "Все заявки" для заказчика
                const quickAll = document.getElementById('quickAllRequestsCard');
                if (quickAll) {
                    if (role === 'Заказчик') {
                        quickAll.style.display = 'none';
                    } else {
                        quickAll.style.display = '';
                    }
                }
            }
        }
        document.addEventListener('DOMContentLoaded', () => MenuPage.init());
    </script>
</body>
</html>
