<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaticService — мои задания</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/pages/menu.html" class="logo">
            <span class="logo-icon">🌡️</span>
            ClimaticService
        </a>
        <button type="button" class="btn btn-secondary btn-sm" onclick="window.location.href='/pages/menu.html'">← Назад</button>
    </nav>

    <main class="container">
        <h1 class="mb-4">Мои задания</h1>
        <p style="color: var(--text-muted); margin-bottom: 1.25rem;">Заявки, назначенные вам. Здесь можно редактировать заявку, менять статус и добавлять комментарии.</p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>№</th>
                        <th>дата</th>
                        <th>тип</th>
                        <th>модель</th>
                        <th>клиент</th>
                        <th>статус</th>
                        <th>дней</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="requestsBody">
                    <tr><td colspan="8" class="loading">Загрузка…</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/requests.js"></script>
    <script>
        const user = Auth.getCurrentUser();
        if (!user || user.type !== 'Специалист') {
            window.location.href = '/pages/menu.html';
        }

        RequestsAPI.getMasterRequests(user.userId).then(requests => {
            if (requests.length === 0) {
                document.getElementById('requestsBody').innerHTML =
                    '<tr><td colspan="8" style="text-align: center; color: var(--text-muted); padding: 2.5rem;">Вам пока не назначены заявки</td></tr>';
                return;
            }
            document.getElementById('requestsBody').innerHTML = requests
                .map(req => RequestRenderer.renderTableRow(req, { actions: true, showDelete: false }))
                .join('');
        }).catch(() => {
            NotificationManager.error('Ошибка загрузки');
            document.getElementById('requestsBody').innerHTML =
                '<tr><td colspan="8" style="text-align: center; color: var(--gray-500); padding: 3rem;">ошибка загрузки</td></tr>';
        });
    </script>
</body>
</html>
